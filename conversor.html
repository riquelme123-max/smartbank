    <header>
      <!-- Fixed navbar -->
      <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
        <a class="navbar-brand" href="/index.html">Smartbank</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
          <ul class="navbar-nav mr-auto">
            
            <li class="nav-item ">
              <a class="nav-link" href="conversor.html">Conversor de moedas</a>
            </li>
            <li class="nav-item ">
              <a class="nav-link" href="listar.html">Lista de saldo</a>
            </li>
            <li class="nav-item ">
              <a class="nav-link" href="transferencia.html">Transferência</a>

        </div>

    <!-- Begin page content -->
    <main role="main" class="container d-flex justify-content-center align-items-center" style="height: 80vh;">
      <div class="card p-4" style="width: 100%; max-width: 400px;" border-radius: 15px;>
        <form id="conversor-form">
          <div class="form-group">
            <label for="Valor">Valor</label>
            <input type="number" class="form-control" id="valor" placeholder="Digite o valor">
          </div>
          <div class="form-group">
            <label for="MoedaOrigem">Moeda de Origem</label>
            <select class="form-control" id="moedaOrigem">
              <option value="">Selecione a moeda de origem</option>
              <option value="USD">Dólar Americano (USD)</option>
              <option value="EUR">Euro (EUR)</option>
              <option value="GBP">Libra Esterlina (GBP)</option>
              <option value="JPY">Iene Japonês (JPY)</option>
              <option value="BRL">Real Brasileiro (BRL)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="MoedaDestino">Moeda de Destino</label>
            <select class="form-control" id="moedaDestino">
              <option value="">Selecione a moeda de destino</option>
              <option value="USD">Dólar Americano (USD)</option>
              <option value="EUR">Euro (EUR)</option>
              <option value="GBP">Libra Esterlina (GBP)</option>
              <option value="JPY">Iene Japonês (JPY)</option>
              <option value="BRL">Real Brasileiro (BRL)</option>
            </select>
          </div>
          <button type="submit" class="btn btn-dark btn-block">Converter</button>
          
        </form>
        <div id="resultado" class="mt-3 text-center"></div>
      </div>
      
    </main>
